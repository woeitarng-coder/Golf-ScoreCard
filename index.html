<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抓球記分卡</title>

    <meta property="og:title" content="抓球記分卡">
    <meta property="og:description" content="專屬的高爾夫抓球記分卡">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://woeitarng-coder.github.io/Golf-ScoreCard/icon.png?v=6">
    <meta property="og:url" content="https://woeitarng-coder.github.io/Golf-ScoreCard/">

    <link rel="icon" type="image/png" href="https://woeitarng-coder.github.io/Golf-ScoreCard/icon.png?v=6">
    <link rel="apple-touch-icon" href="https://woeitarng-coder.github.io/Golf-ScoreCard/icon.png?v=6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="抓球記分卡">
    <link rel="manifest" href="https://woeitarng-coder.github.io/Golf-ScoreCard/manifest.json?v=6">

    <style>
        html, body {
            margin: 0; 
            padding: 0;
            background-color: #121212; 
            overflow: hidden;
            width: 100%; 
            height: 100vh; 
            height: 100dvh; 
        }
        
        /* --- 載入畫面的專屬設計 --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* 配合你 manifest 寫的黑色背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 確保它蓋在最上層 */
            transition: opacity 0.6s ease-out; /* 消失時會有柔和的淡出效果 */
        }

        .splash-icon {
            width: 120px;
            height: 120px;
            border-radius: 25px; /* 讓方形圖示稍微有點圓角更好看 */
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #splash-greeting {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
            letter-spacing: 1px;
        }

        /* 旋轉讀取動畫 */
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #2E7D32; /* 用你 manifest 設定的深綠色 */
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* --- 載入畫面設計結束 --- */

        .iframe-container {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://woeitarng-coder.github.io/Golf-ScoreCard/icon.png?v=6" alt="App Icon" class="splash-icon">
        <div id="splash-greeting">準備中...</div>
        <div class="loader"></div>
    </div>

    <div class="iframe-container">
        <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbyIyrIpEfWgVNwyXzp9NhN8nokkF_nb-jvhw9SvXI3EjGV11amnZkCadGEL_zOt3Vno/exec"></iframe>
    </div>

    <script>
        // 你可以在這裡自由增加或修改你想出現的問候語！
        const greetings = [
            "今天天氣真好，準備抓鳥囉！ ⛳",
            "穩住節奏，每一桿都很關鍵！ 💪",
            "放輕鬆，享受高爾夫的樂趣！ 😎",
            "球道中央見！ 🏌️‍♂️",
            "這洞推進，直接清盤！ 💰",
            "專注當下，打出漂亮的一擊！ ✨",
            "今天手感火燙，準備破紀錄！ 🔥"
        ];

        window.addEventListener('DOMContentLoaded', () => {
            // 隨機挑選一句問候語顯示
            const greetingElement = document.getElementById('splash-greeting');
            const randomIndex = Math.floor(Math.random() * greetings.length);
            greetingElement.textContent = greetings[randomIndex];

            const splashScreen = document.getElementById('splash-screen');
            const gasIframe = document.getElementById('gas-iframe');

            // 隱藏載入畫面的函數
            const hideSplash = () => {
                splashScreen.style.opacity = '0'; // 先讓畫面變透明 (觸發 CSS 淡出動畫)
                setTimeout(() => {
                    splashScreen.style.display = 'none'; // 動畫播完後真正移除它，才不會擋住按鈕
                }, 600);
            };

            // 設定最少顯示 1.5 秒，不然 GAS 載入太快會閃一下就不見，字會來不及看
            const minDisplayTime = new Promise(resolve => setTimeout(resolve, 1500));
            
            // 偵測 GAS 網頁是否已經完全載入
            const iframeLoaded = new Promise(resolve => {
                gasIframe.onload = resolve;
                // 防呆機制：如果網路太慢超過 6 秒，就不等了直接進畫面
                setTimeout(resolve, 6000); 
            });

            // 當「時間到了」而且「網頁也載入完了」，就隱藏載入畫面
            Promise.all([minDisplayTime, iframeLoaded]).then(() => {
                hideSplash();
            });
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
